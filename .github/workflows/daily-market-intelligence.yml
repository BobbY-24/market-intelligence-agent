name: Daily Market Intelligence

on:
  schedule:
    - cron: "30 11 * * 1-5"
    - cron: "30 12 * * 1-5"
  workflow_dispatch:

jobs:
  run-daily:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check local Eastern report time
        id: timecheck
        run: |
          local_time=$(TZ=America/New_York date +%H:%M)
          if [ "$local_time" = "07:30" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-python@v5
        if: steps.timecheck.outputs.should_run == 'true' || github.event_name == 'workflow_dispatch'
        with:
          python-version: "3.11"
      - name: Install
        if: steps.timecheck.outputs.should_run == 'true' || github.event_name == 'workflow_dispatch'
        run: python -m pip install -e .
      - name: Run daily report
        if: steps.timecheck.outputs.should_run == 'true' || github.event_name == 'workflow_dispatch'
        run: python -m src.main run-daily
      - name: Upload reports
        if: steps.timecheck.outputs.should_run == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: market-intelligence-reports
          path: reports/
      - name: Commit generated reports to repository
        if: steps.timecheck.outputs.should_run == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/*.md reports/*.json
          if git diff --cached --quiet; then
            echo "No generated report changes to commit."
            exit 0
          fi
          git commit -m "Add daily market reports"
          git push
